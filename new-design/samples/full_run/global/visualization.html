<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>叙事档案 · 全局分析</title>
<style>
  :root{
    --paper:#1a1714; --paper2:#221d18; --ink:#e8dcc8; --ink-dim:#9a8f7d;
    --stamp:#a8332a; --thread:#b8884a; --line:#3a322a; --accent:#6f9b8e;
    --social:#b8884a; --kin:#a8332a; --affective:#c77b8b; --event:#6f9b8e;
    --allegiance:#8a6db5; --awareness:#5b8bb0; --attitude:#c0945a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"Songti SC","STSong","Noto Serif SC",serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 20% 10%,rgba(168,51,42,.04),transparent 40%),
                     radial-gradient(circle at 80% 90%,rgba(184,136,74,.04),transparent 40%);}
  .wrap{max-width:1180px;margin:0 auto;padding:48px 32px 80px}
  header{border-bottom:2px solid var(--stamp);padding-bottom:24px;margin-bottom:8px;position:relative}
  .eyebrow{font-size:12px;letter-spacing:.5em;color:var(--stamp);text-transform:uppercase;margin-bottom:12px;
    font-family:"PingFang SC",sans-serif;font-weight:600}
  h1{font-size:42px;font-weight:700;letter-spacing:.04em;margin-bottom:6px}
  .sub{color:var(--ink-dim);font-size:15px;letter-spacing:.1em}
  .stamp{position:absolute;top:0;right:0;border:2px solid var(--stamp);color:var(--stamp);
    padding:8px 14px;transform:rotate(-8deg);font-family:"PingFang SC",sans-serif;font-weight:700;
    font-size:13px;letter-spacing:.2em;opacity:.85}
  .meta{display:flex;gap:28px;margin:20px 0 32px;flex-wrap:wrap;font-family:"PingFang SC",sans-serif}
  .meta div{font-size:13px;color:var(--ink-dim)}
  .meta b{display:block;font-size:26px;color:var(--ink);font-family:serif;font-weight:700}
  nav{display:flex;gap:4px;margin-bottom:28px;border-bottom:1px solid var(--line)}
  nav button{background:none;border:none;color:var(--ink-dim);padding:12px 20px;cursor:pointer;
    font-family:"PingFang SC",sans-serif;font-size:14px;letter-spacing:.1em;border-bottom:2px solid transparent;
    transition:all .2s}
  nav button:hover{color:var(--ink)}
  nav button.on{color:var(--stamp);border-bottom-color:var(--stamp)}
  .view{display:none;animation:fade .4s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
  svg{width:100%;display:block}
  .panel{background:var(--paper2);border:1px solid var(--line);border-radius:2px;padding:8px}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:16px 0;font-family:"PingFang SC",sans-serif;font-size:12px;color:var(--ink-dim)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:14px;height:3px;display:inline-block;border-radius:2px}
  .node circle{cursor:pointer;transition:r .2s}
  .node text{font-family:serif;fill:var(--ink);font-size:13px;pointer-events:none}
  .node:hover circle{stroke:var(--ink);stroke-width:2}
  .edge-label{fill:var(--ink-dim);font-size:10px;font-family:"PingFang SC",sans-serif}
  .tl-row{display:flex;align-items:flex-start;gap:0;margin-bottom:2px}
  .tl-name{width:120px;flex-shrink:0;text-align:right;padding:14px 16px 0 0;font-size:15px;font-weight:700}
  .tl-track{flex:1;display:flex;gap:8px;flex-wrap:wrap;padding:10px 0;border-left:1px solid var(--line);padding-left:18px}
  .beat{background:var(--paper2);border:1px solid var(--line);border-radius:2px;padding:7px 11px;font-size:12px;
    font-family:"PingFang SC",sans-serif;position:relative;max-width:200px}
  .beat .ch{font-size:10px;color:var(--thread);letter-spacing:.1em}
  .beat.fb{border-style:dashed;border-color:var(--allegiance);opacity:.9}
  .beat.fb::after{content:"回";position:absolute;top:-7px;right:-7px;background:var(--allegiance);color:#fff;
    width:16px;height:16px;border-radius:50%;font-size:9px;text-align:center;line-height:16px}
  .loc-tree{font-family:"PingFang SC",sans-serif}
  .loc-node{padding:6px 0}
  .loc-node .nm{font-size:14px}
  .loc-node .sc{font-size:10px;color:var(--thread);margin-left:8px;letter-spacing:.1em}
  .sync-item{background:var(--paper2);border-left:3px solid var(--accent);padding:10px 14px;margin-bottom:8px;
    font-family:"PingFang SC",sans-serif;font-size:13px}
  .sync-item .who{color:var(--accent);font-size:12px;margin-top:3px}
  .loc-shelf{background:var(--paper2);border:1px solid var(--line);border-radius:2px;padding:14px 16px;margin-bottom:12px}
  .loc-shelf h3{font-family:"PingFang SC",sans-serif;font-size:14px;color:var(--thread);letter-spacing:.15em;margin-bottom:10px;font-weight:600;border-bottom:1px solid var(--line);padding-bottom:8px}
  .loc-shelf .goods{display:flex;gap:8px;flex-wrap:wrap}
  .loc-shelf .good{background:var(--paper);border:1px solid var(--line);border-radius:2px;padding:6px 12px;font-size:13px;font-family:"PingFang SC",sans-serif}
  .tip{position:fixed;background:#0d0b09;border:1px solid var(--thread);padding:8px 12px;border-radius:2px;
    font-size:12px;font-family:"PingFang SC",sans-serif;pointer-events:none;opacity:0;transition:opacity .15s;
    max-width:240px;z-index:99;color:var(--ink)}
  h2{font-size:15px;font-family:"PingFang SC",sans-serif;letter-spacing:.2em;color:var(--ink-dim);
    margin:0 0 14px;font-weight:600;text-transform:uppercase}
  footer{margin-top:60px;padding-top:20px;border-top:1px solid var(--line);color:var(--ink-dim);
    font-size:12px;font-family:"PingFang SC",sans-serif;letter-spacing:.1em}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">机密 · 叙事结构卷宗</div>
    <h1>全局人物·关系·时序</h1>
    <div class="sub">Narrative Analysis — Cross-Chapter Global View</div>
    <div class="stamp">已归档</div>
  </header>
  <div class="meta" id="meta"></div>
  <nav>
    <button class="on" data-v="rel">人物关系网</button>
    <button data-v="time">个人时间线</button>
    <button data-v="loc">地点层级</button>
    <button data-v="sync">同步点</button>
    <button data-v="items">物品位置</button>
  </nav>
  <div class="view on" id="v-rel">
    <div class="legend" id="rel-legend"></div>
    <div class="panel"><svg id="graph" height="560"></svg></div>
  </div>
  <div class="view" id="v-time">
    <h2>按全局人物 · 跨章缝合(虚线圈"回"= 闪回)</h2>
    <div id="timelines"></div>
  </div>
  <div class="view" id="v-loc">
    <h2>空间包含层级(containment)</h2>
    <div class="panel" style="padding:20px"><div class="loc-tree" id="loctree"></div></div>
  </div>
  <div class="view" id="v-sync">
    <h2>跨人物同步点 · 多人共在事件,时间线在此对齐</h2>
    <div id="syncs"></div>
  </div>
  <div class="view" id="v-items">
    <h2>物品位置 · 物品→场景→地点 推导(每个地点陈列其中的物品)</h2>
    <div id="itempos"></div>
  </div>
  <footer>本卷宗由 Qwen3.6 五维度提取 + 确定性归并/跨章缝合生成 · 关系信 high、复核 medium、人工终裁</footer>
</div>

// ---- 关系网络:简易力导向 ----
function drawGraph(){
  const svg=document.getElementById('graph');
  const W=svg.clientWidth||1100, H=560;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  // 只画有关系的人物
  const deg={}; DATA.char_relations.forEach(r=>{deg[r.from]=(deg[r.from]||0)+1;deg[r.to]=(deg[r.to]||0)+1;});
  const nodes=DATA.characters.filter(c=>deg[c.id]).map(c=>({...c,deg:deg[c.id]||0}));
  const idx={}; nodes.forEach((n,i)=>idx[n.id]=i);
  // 初始化:圆形布局
  nodes.forEach((n,i)=>{const a=2*Math.PI*i/nodes.length;n.x=W/2+Math.cos(a)*200;n.y=H/2+Math.sin(a)*180;n.vx=0;n.vy=0;});
  const links=DATA.char_relations.filter(r=>idx[r.from]!=null&&idx[r.to]!=null);
  // 力导向迭代
  for(let it=0;it<300;it++){
    nodes.forEach(a=>{a.fx=0;a.fy=0;
      nodes.forEach(b=>{if(a===b)return;let dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||1;
        let f=4200/(d*d);a.fx+=dx/d*f;a.fy+=dy/d*f;});});
    links.forEach(l=>{let a=nodes[idx[l.from]],b=nodes[idx[l.to]],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1;
      let f=(d-150)*0.02;a.fx+=dx/d*f;a.fy+=dy/d*f;b.fx-=dx/d*f;b.fy-=dy/d*f;});
    nodes.forEach(n=>{n.x+=Math.max(-8,Math.min(8,n.fx));n.y+=Math.max(-8,Math.min(8,n.fy));
      n.x=Math.max(60,Math.min(W-60,n.x));n.y=Math.max(40,Math.min(H-40,n.y));});
  }
  let h='<defs>';
  usedTypes.forEach(t=>h+=`<marker id="ar-${t}" markerWidth="8" markerHeight="8" refX="20" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="${RC[t]}"/></marker>`);
  h+='</defs>';
  links.forEach(l=>{let a=nodes[idx[l.from]],b=nodes[idx[l.to]];
    let dash=l.conf==='medium'?'stroke-dasharray="5,4"':'';
    h+=`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="${RC[l.type]}" stroke-width="${l.conf==='medium'?1.2:1.8}" opacity="0.7" ${dash} marker-end="url(#ar-${l.type})"
      data-lbl="${l.label} · ${RT[l.type]||l.type}${l.conf==='medium'?' (待确认)':''}"/>`;});
  nodes.forEach(n=>{let r=8+Math.min(n.deg*2,10);let cross=n.chapters.length>1;
    h+=`<g class="node" data-id="${n.id}"><circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${cross?'#a8332a':'#2a241d'}" stroke="${cross?'#e8dcc8':'#b8884a'}" stroke-width="1.5"/>
      <text x="${n.x}" y="${n.y-r-6}" text-anchor="middle">${n.name}</text></g>`;});
  svg.innerHTML=h;
  svg.querySelectorAll('line').forEach(L=>{L.addEventListener('mousemove',e=>showTip(e,L.dataset.lbl));L.addEventListener('mouseleave',hideTip);});
  svg.querySelectorAll('.node').forEach(N=>{const c=DATA.characters.find(x=>x.id==N.dataset.id);
    N.addEventListener('mousemove',e=>showTip(e,`<b>${c.name}</b><br>别名: ${c.aliases.join('、')||'—'}<br>出现: 第${c.chapters.join('、')}章`));
    N.addEventListener('mouseleave',hideTip);});
}

// ---- 时间线 ----
function drawTimelines(){
  const box=document.getElementById('timelines');
  const named=Object.entries(DATA.timelines).map(([id,evs])=>({name:cmap[id]||('#'+id),evs}))
    .filter(t=>t.evs.length).sort((a,b)=>b.evs.length-a.evs.length);
  box.innerHTML=named.map(t=>`<div class="tl-row"><div class="tl-name">${t.name}</div>
    <div class="tl-track">${t.evs.map(e=>`<div class="beat ${e.fb?'fb':''}"><div class="ch">第${e.ch}章 · ${e.seq}</div>${e.desc}</div>`).join('')}</div></div>`).join('');
}

// ---- 地点层级(containment 构树) ----
function drawLocTree(){
  const cont=DATA.loc_relations.filter(r=>r.type==='containment');
  const parent={}; cont.forEach(r=>parent[r.from]=r.to);  // from 在 to 内
  const lname={}; DATA.locations.forEach(l=>lname[l.id]=l);
  const children={}; cont.forEach(r=>{(children[r.to]=children[r.to]||[]).push(r.from);});
  const roots=DATA.locations.filter(l=>!parent[l.id]);
  function render(l,depth){
    let h=`<div class="loc-node" style="margin-left:${depth*22}px"><span class="nm">${depth>0?'└ ':''}${l.name}</span><span class="sc">第${l.chapters.join('、')}章</span></div>`;
    (children[l.id]||[]).forEach(cid=>{if(lname[cid])h+=render(lname[cid],depth+1);});
    return h;
  }
  document.getElementById('loctree').innerHTML=roots.map(r=>render(r,0)).join('')||'<div style="color:var(--ink-dim)">无包含关系数据</div>';
}

// ---- 同步点 ----
function drawSync(){
  document.getElementById('syncs').innerHTML=DATA.sync.map(s=>
    `<div class="sync-item">${s.desc}<div class="who">同步 → ${s.parts.map(p=>cmap[p]||('#'+p)).join(' · ')}</div></div>`).join('');
}

// ---- 物品位置 ----
function drawItems(){
  const box=document.getElementById('itempos');
  box.innerHTML=(DATA.loc_items||[]).map(b=>
    `<div class="loc-shelf"><h3>${b.loc} · ${b.items.length}件</h3><div class="goods">${b.items.map(i=>`<span class="good">${i}</span>`).join('')}</div></div>`).join('')
    || '<div style="color:var(--ink-dim)">无物品位置数据</div>';
}

// nav
document.querySelectorAll('nav button').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');document.getElementById('v-'+b.dataset.v).classList.add('on');
  if(b.dataset.v==='rel')drawGraph();
}));
drawGraph();drawTimelines();drawLocTree();drawSync();drawItems();
window.addEventListener('resize',()=>{if(document.getElementById('v-rel').classList.contains('on'))drawGraph();});
